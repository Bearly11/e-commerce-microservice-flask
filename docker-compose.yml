version: '3.9'

services:

  user-service:
    build: ./services/user-service
    ports:
      - "5002:5002"

  product-service:
    build: ./services/product-service
    ports:
      - "5000:5000"

  order-service:
    build: ./services/order-service
    ports:
      - "5001:5001"
    depends_on:
      - product-service
      - user-service

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - product-service
      - order-service